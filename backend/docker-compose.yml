version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kandakorlik_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-kandakorlik_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kandakorlik_secure_password}
      POSTGRES_DB: ${DB_NAME:-kandakorlik_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kandakorlik_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kandakorlik_network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kandakorlik_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kandakorlik_user}:${DB_PASSWORD:-kandakorlik_secure_password}@postgres:5432/${DB_NAME:-kandakorlik_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      TRANSLATION_SERVICE: ${TRANSLATION_SERVICE:-deepl}
      DEEPL_API_KEY: ${DEEPL_API_KEY}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    command: >
      bash -c "python init_db.py && 
               uvicorn main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    networks:
      - kandakorlik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kandakorlik_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kandakorlik.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - kandakorlik_network

volumes:
  postgres_data:
    driver: local

networks:
  kandakorlik_network:
    driver: bridge
